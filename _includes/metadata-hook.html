<script>
/* 头像左上角主题切换代理按钮 */
(function () {
  function addAvatarThemeBtn() {
    if (document.getElementById('avatar-theme-btn')) return;

    var avatar = document.getElementById('avatar');
    if (!avatar) return;

    // 判断当前是否深色模式
    function isDark() {
      return document.documentElement.getAttribute('data-mode') === 'dark'
        || (!document.documentElement.hasAttribute('data-mode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    var btn = document.createElement('button');
    btn.id = 'avatar-theme-btn';
    btn.title = '切换主题';
    btn.type = 'button';

    // 用 position: fixed，根据头像的实际视口坐标定位，绕过 overflow 和 transform 问题
    function positionBtn() {
      var r = avatar.getBoundingClientRect();
      btn.style.top    = (r.top  - 10) + 'px';
      btn.style.left   = (r.left - 10) + 'px';
    }

    btn.style.cssText = [
      'position: fixed',
      'z-index: 99999',
      'width: 28px',
      'height: 28px',
      'border-radius: 50%',
      'border: none',
      'background: rgba(40,40,60,0.75)',
      'color: #fff',
      'font-size: 13px',
      'cursor: pointer',
      'display: flex',
      'align-items: center',
      'justify-content: center',
      'padding: 0',
      'margin: 0',
      'box-shadow: 0 1px 4px rgba(0,0,0,0.4)',
      'transition: opacity 0.2s'
    ].join(';');

    function updateIcon() {
      btn.innerHTML = isDark() ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    updateIcon();
    positionBtn();

    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var orig = document.getElementById('mode-toggle');
      if (orig) orig.click();
      setTimeout(updateIcon, 80);
    });

    // 监听主题属性变化，同步图标
    var observer = new MutationObserver(function () { updateIcon(); });
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-mode']
    });

    // resize 时重新定位
    window.addEventListener('resize', positionBtn);

    // 挂到 body，fixed 定位不受父元素影响
    document.body.appendChild(btn);

    // 隐藏底部原始按钮
    var orig = document.getElementById('mode-toggle');
    if (orig) {
      orig.style.setProperty('display', 'none', 'important');
      orig.style.setProperty('visibility', 'hidden', 'important');
      var border = orig.nextElementSibling;
      if (border && border.classList.contains('icon-border')) {
        border.style.display = 'none';
      }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(addAvatarThemeBtn, 300);
    });
  } else {
    setTimeout(addAvatarThemeBtn, 300);
  }
})();
</script>
