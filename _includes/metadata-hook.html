<script>
/* 头像左上角主题切换代理按钮 */
(function () {
  function addAvatarThemeBtn() {
    if (document.getElementById('avatar-theme-btn')) return;

    // 挂载到 #avatar 上，使 absolute 定位相对于头像图片
    var profileWrapper = document.getElementById('avatar');
    if (!profileWrapper) return;
    // 强制设置为定位父元素
    profileWrapper.style.setProperty('position', 'relative', 'important');
    profileWrapper.style.setProperty('display', 'inline-block', 'important');

    // 判断当前是否深色模式
    function isDark() {
      return document.documentElement.getAttribute('data-mode') === 'dark'
        || document.documentElement.hasAttribute('data-mode') === false && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    var btn = document.createElement('button');
    btn.id = 'avatar-theme-btn';
    btn.title = '切换主题';
    btn.type = 'button';
    // 直接用 JS 设置所有样式，不依赖 CSS 文件
    btn.style.cssText = [
      'position: absolute',
      'top: 2px',
      'left: 2px',
      'z-index: 9999',
      'width: 28px',
      'height: 28px',
      'border-radius: 50%',
      'border: none',
      'background: rgba(40,40,60,0.75)',
      'color: #fff',
      'font-size: 13px',
      'cursor: pointer',
      'display: flex',
      'align-items: center',
      'justify-content: center',
      'padding: 0',
      'margin: 0',
      'box-shadow: 0 1px 4px rgba(0,0,0,0.4)'
    ].join(';');

    function updateIcon() {
      btn.innerHTML = isDark() ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    updateIcon();

    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      // 直接触发 Chirpy 原生按钮的 click
      var orig = document.getElementById('mode-toggle');
      if (orig) {
        orig.click();
      }
      setTimeout(updateIcon, 80);
    });

    // 监听主题属性变化，保持图标同步
    var observer = new MutationObserver(function () { updateIcon(); });
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['data-mode']
    });

    profileWrapper.appendChild(btn);

    // 用 JS 隐藏原始底部按钮（CSS 优先级不足时的备用方案）
    var orig = document.getElementById('mode-toggle');
    if (orig) {
      orig.style.setProperty('display', 'none', 'important');
      orig.style.setProperty('visibility', 'hidden', 'important');
      // 也隐藏分隔线
      var border = orig.nextElementSibling;
      if (border && border.classList.contains('icon-border')) {
        border.style.display = 'none';
      }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(addAvatarThemeBtn, 200);
    });
  } else {
    setTimeout(addAvatarThemeBtn, 200);
  }
})();
</script>
