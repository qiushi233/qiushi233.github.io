theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: latte的博客
tagline: 技术分享与生活记录
description: >-
  latte 的个人技术博客，分享编程、工具与生活。

url: "https://qiushi233.github.io"

github:
  username: qiushi233

author: latte
social:
  name: latte
  email: ""
  links:
    - https://github.com/qiushi233

avatar: /assets/img/avatar.svg

theme_mode: # [light | dark]，留空则显示切换按钮，跟随用户偏好

cdn: ""

toc: true

comments:
  active: ""

assets:
  self_host:
    enabled: false

pwa:
  enabled: false

paginate: 10

# 版本号（每次更新+1，用于强制刷新缓存）
build: 2026040306

# ------------ 以下为 Jekyll 基础配置 ------------
permalink: /posts/:title/
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: ""
      type: pages
    values:
      layout: page

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - CHANGELOG.md
  - LICENSE
  - "*.sh"
  - node_modules
  - package.json
  - package-lock.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
